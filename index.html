<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyauw Room | 你的专属安心角落</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            /* 品牌核心色彩指南 V3 */
            --bg-color: #F5F5DC;      /* 暖沙色: 环境与呼吸 */
            --text-main: #3E2723;    /* 深咖啡色: 专业与边界 */
            --accent-color: #C08261; /* 陶土红: 人际关系与脉搏 */
            --white: #FFFFFF;        /* 纯白色 */
            --font-logo: 'Dancing Script', cursive; 
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.8;
            overflow-x: hidden;
        }

        /* 导航栏：纯白色背景优化 */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 8%;
            height: 64px; 
            background: var(--white); 
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 1px 5px rgba(62, 39, 35, 0.05); 
        }

        .logo img {
            height: 42px;
            width: auto;
            display: block;
        }

        .nav-links {
            display: flex;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-main);
            margin-left: 30px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--accent-color);
        }

        .cta-btn {
            background-color: var(--text-main);
            color: var(--white);
            padding: 10px 22px;
            border: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-left: 30px;
            font-size: 0.8rem;
            transition: all 0.3s;
        }

        .cta-btn:hover {
            background-color: var(--accent-color);
            transform: translateY(-1px);
        }

        /* Hero 沉浸式区域 */
        .hero {
            min-height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 80px 15%;
            background: linear-gradient(rgba(245,245,220,0.85), rgba(245,245,220,0.85)), url('booking-bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .hero-content h1 {
            font-family: var(--font-serif);
            font-size: 3.2rem;
            margin-bottom: 20px;
            line-height: 1.2;
            font-weight: 400;
        }

        .hero-content h1 em {
            font-family: var(--font-logo);
            font-style: normal;
            font-size: 3.8rem;
            display: block;
            margin-top: 10px;
            color: var(--text-main);
        }

        .hero-content p {
            font-size: 1.15rem;
            margin-bottom: 45px;
            font-style: italic;
            opacity: 0.85;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        /* 视频/视觉占位符 */
        .video-container {
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            background: var(--text-main);
            margin: 0 auto;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 40px 80px rgba(62, 39, 35, 0.12);
            background-image: url('booking-bg.png');
            background-size: cover;
            background-blend-mode: multiply;
        }

        .play-icon {
            width: 75px;
            height: 75px;
            border: 1px solid var(--white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
        }

        .play-icon:hover {
            transform: scale(1.1);
            background: var(--accent-color);
            border-color: var(--accent-color);
        }

        /* 品牌理念与背书区域 */
        .social-proof {
            padding: 70px 0;
            background: var(--white);
            text-align: center;
        }

        .social-proof p {
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 4px;
            margin-bottom: 35px;
            color: #AAA;
            font-weight: 600;
        }

        .logo-grid {
            display: flex;
            justify-content: center;
            gap: 60px;
            opacity: 0.45;
            font-family: var(--font-serif);
            font-size: 1.3rem;
            filter: grayscale(100%);
        }

        /* 页脚：纯白色背景优化 */
        footer {
            background-color: var(--white); 
            text-align: center;
            padding: 60px 20px;
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--text-main);
            border-top: 1px solid #EEE; 
        }

        /* WhatsApp 悬浮按钮 */
        .wa-float {
            position: fixed;
            bottom: 35px;
            right: 35px;
            background-color: #25D366;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            z-index: 2000;
            text-decoration: none;
            transition: 0.3s;
        }
        .wa-float:hover { transform: scale(1.1); }

        /* 移动端优化 */
        @media (max-width: 768px) {
            nav { height: 60px; padding: 0 5%; background: var(--white); }
            .hero-content h1 { font-size: 2.2rem; }
            .hero-content h1 em { font-size: 2.5rem; }
            .nav-links { display: none; }
            .hero { padding: 60px 8%; }
            .logo-grid { gap: 30px; font-size: 1rem; flex-wrap: wrap; padding: 0 20px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">
            <img src="logo.png" alt="Lyauw Room Logo">
        </a>
        <div class="nav-links">
            <a href="#about">About</a>
            <a href="#listen">Listen</a>
            <a href="#talk">Talk</a>
            <button class="cta-btn">立即预约</button>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>在这个喧嚣的世界 <br><em>我们静静聆听。</em></h1>
            <p>
                提供一个独立于家庭与工作之外的“第三空间”。在这里，只有真诚的陪伴，没有先入为主的评判。
            </p>
            
            <div class="video-container">
                <div class="play-icon">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="white">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                </div>
            </div>
        </div>
    </header>

    <section class="social-proof">
        <p>PEOPLE FIRST · RADICAL EMPATHY</p>
        <div class="logo-grid">
            <span>Authenticity</span>
            <span>Respect</span>
            <span>Security</span>
            <span>Warmth</span>
        </div>
    </section>

    <a href="https://wa.me/60122395001" class="wa-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <footer>
        &copy; 2026 LYAUW ROOM PLT. <br>
        <span style="opacity: 0.6; margin-top: 10px; display: block;">以人为本 · 极致共情</span>
    </footer>

</body>
</html>
